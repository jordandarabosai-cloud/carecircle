name: desktop-macos

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-macos.yml"

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Detect signing readiness
        id: signing
        shell: bash
        run: |
          if [[ -n "${APPLE_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" && -n "${APPLE_TEAM_ID}" && -n "${CSC_LINK}" && -n "${CSC_KEY_PASSWORD}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Signing/notarization secrets are present."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Signing/notarization secrets are missing; unsigned fallback build will run."
          fi
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API integration tests
        run: npm run test:api

      - name: Validate mac config
        run: npm --workspace @carecircle/desktop run check:mac

      - name: Build desktop mac package (signed)
        if: steps.signing.outputs.ready == 'true'
        run: npm --workspace @carecircle/desktop run pack:mac

      - name: Build desktop mac package (unsigned fallback)
        if: steps.signing.outputs.ready != 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm --workspace @carecircle/desktop run pack:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carecircle-desktop-macos-${{ steps.signing.outputs.ready == 'true' && 'signed' || 'unsigned' }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          if-no-files-found: warn
