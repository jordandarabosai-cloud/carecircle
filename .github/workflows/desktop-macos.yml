name: desktop-macos

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-macos.yml"

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API integration tests
        run: npm run test:api

      - name: Validate mac config
        run: npm --workspace @carecircle/desktop run check:mac

      - name: Build desktop mac package
        run: npm --workspace @carecircle/desktop run pack:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carecircle-desktop-macos
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          if-no-files-found: warn
